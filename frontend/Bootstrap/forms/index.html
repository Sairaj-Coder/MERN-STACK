<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <form action="php">
        <!-- here mb-3 is style  -->
        <div class="container">
            <!-- form-label and form-control are classes -->
             <!-- we can use grid into column  -->
            <div class="row">
                <div class="mb-4 col-md-6 ">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control">
                </div>
                <div class="mb-4 col-md-6">
                    <label for="pass" class="form-label">Password</label>
                    <input type="password" id="pass" class="form-control">
                </div>
            </div>
            <!-- by select option we can create drop down menu -->
            <div class="mb-3">
                <!-- here we use class="form-select" and lg is size -->
                <select class="form-select-lg">
                    <option selected>select something</option>
                    <option value="1">one</option>
                    <option value="2">two</option>
                    <option value="3">three</option>
                </select>
            </div>
            <!-- now we are creating checkbox buttons -->
            <div>
                <input type="checkbox" id="agree">
                <label for="agree">normal-checkbox</label>
            </div>
            <br><br>
            <div class="mb-3">
                <input type="checkbox" id="agreebs" class="form-check-input">
                <label for="agreebs" class="form-check-label">bootstrap-checkbox</label>
            </div>
        </div>
    </form>
</body>

</html>
