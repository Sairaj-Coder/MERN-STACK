<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<!-- TO create normal alert we just have to include alert class
-->
<div class="alert text-bg-primary" role="alert">
    Congratulation sir! you are in top 1 percent
</div>

<!-- here we have to use different text-bg-primary which is not part alert
color
-->
<div class="alert alert-success">
    Congratulation sir! 
</div>

<br><br>
<!-- This is alert button with the help of javascript it and create alert -->
<div id="liveAlertPlaceholder"></div>
<button type="button" class="btn btn-primary" id="liveAlertBtn">Show live alert</button>

<!-- here alert warning is color -->
<!-- dismiss alert -->
 <br><br>
<div class="alert alert-warning alert-dismissible fade show  ">
    Click here to close!
    <button type="button" class="btn-close" data-bs-dismiss="alert"  aria-label="Close"></button>
</div>







</body>
</html>
