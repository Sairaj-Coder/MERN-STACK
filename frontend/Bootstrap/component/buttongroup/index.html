<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button components</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
 
    <br>
    This buttons are grouped together by class=btn-group
    <br>
    <br>
   <div class="btn-group">
   <button type="button" class="btn btn-primary">button1</button> 
   
   <button type="button" class="btn btn-success">button2</button> 
   <button type="button" class="btn btn-outline-primary">button3</button> 
   </div>
   <br><br>
   <p>Same we can do with radio button just we have to add class</p>
   <br>
   <div class="btn-group" >
    <input type="radio" class="btn-check" id="1" name="val" value="1"  >
    <label for="1" class="btn btn-outline-secondary">radio 1:</label>
    
    
    <input type="radio" class="btn-check" id="2" name="val" value="2"  >
    <label for="2" class="btn btn-outline-success">radio 2:</label>
    
    <!-- class='btn-check' is to remove circle of radio button -->
    <input type="radio" class="btn-check" id="3" name="val" value="3"  >
    <label for="3" class="btn btn-outline-primary" >radio 3:</label>
    

   </div>
   <br><br>
    <h3>Read the bootsratp for more information</h3>
</body>
</html>
